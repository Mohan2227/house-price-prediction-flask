<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background buildings effect */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1505842465776-3d90f616310d') no-repeat center/cover;
            opacity: 0.15;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            width: 320px;
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px #00c6ff;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00c6ff;
        }

        h3 {
            margin-top: 20px;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>House Price Prediction</h2>

    <form action="/predict" method="post">
        <input type="text" name="sqft" placeholder="Square Feet" required>
        <input type="text" name="bedrooms" placeholder="Bedrooms" required>
        <input type="text" name="bathrooms" placeholder="Bathrooms" required>
        
        <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
    <h3>{{ prediction_text }}</h3>
    {% endif %}
</div>

</body>
</html>
